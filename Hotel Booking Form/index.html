<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Booking Form</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>Hotel Booking Form</h2>

<form id="bookingForm">

<div class="row">

<div class="form-group">
<label>Check-in Date</label>
<input type="date" id="checkin" required>
<div class="error" id="checkinError"></div>
</div>

<div class="form-group">
<label>Check-out Date</label>
<input type="date" id="checkout" required>
<div class="error" id="checkoutError"></div>
</div>

</div>

<div class="form-group">
<label>Room Type</label>
<select id="roomType" required>
<option value="">Select Room Type</option>
<option value="Single">Single</option>
<option value="Double">Double</option>
<option value="Suite">Suite</option>
</select>
<div class="error" id="roomError"></div>
</div>

<div class="form-group">
<label>Number of Guests</label>
<input type="number" id="guests" min="1" max="10" required>
<div class="error" id="guestError"></div>
</div>

<div class="form-group">
<label>Special Requests</label>
<textarea id="requests"></textarea>
</div>

<button type="submit">Book Now</button>

<div class="success" id="successMessage"></div>

</form>

</div>

<script src="script.js"></script>

</body>
</html>
